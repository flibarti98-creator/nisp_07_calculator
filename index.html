<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand"></div>
            <div class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="btn col-2 color-alt" data-clear>C</button>
            <button class="btn color-alt" data-delete>DEL</button>
            <button class="btn color-op" data-operation>/</button>
            
            <button class="btn" data-number>7</button>
            <button class="btn" data-number>8</button>
            <button class="btn" data-number>9</button>
            <button class="btn color-op" data-operation>*</button>
            
            <button class="btn" data-number>4</button>
            <button class="btn" data-number>5</button>
            <button class="btn" data-number>6</button>
            <button class="btn color-op" data-operation>-</button>
            
            <button class="btn" data-number>1</button>
            <button class="btn" data-number>2</button>
            <button class="btn" data-number>3</button>
            <button class="btn color-op" data-operation>+</button>
            
            <button class="btn col-2" data-number>0</button>
            <button class="btn" data-number>.</button>
            <button class="btn color-eq" data-equals>=</button>
        </div>
    </div>
</body>
</html>
